services:
  order-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${ORDER_DB_NAME}
    ports:
      - "${ORDER_DB_PORT}:5432"

  payment-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${PAYMENT_DB_NAME}
    ports:
      - "${PAYMENT_DB_PORT}:5432"

  rabbitmq:
    image: rabbitmq:4-management
    container_name: ap2_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  payment-service:
    build:
      context: .
      dockerfile: payment/Dockerfile
    ports:
      - "50051:50051"
    environment:
      - PAYMENT_DB_URL=postgres://${DB_USER}:${DB_PASSWORD}@payment-db:5432/${PAYMENT_DB_NAME}?sslmode=disable
      - PAYMENT_GRPC_PORT=${PAYMENT_GRPC_PORT}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      payment-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: order/Dockerfile
    ports:
      - "8080:8080"
      - "50052:50052"
    environment:
      - ORDER_DB_URL=postgres://${DB_USER}:${DB_PASSWORD}@order-db:5432/${ORDER_DB_NAME}?sslmode=disable
      - ORDER_HTTP_PORT=8080
      - ORDER_GRPC_PORT=${ORDER_GRPC_PORT}
      - PAYMENT_SERVICE_ADDR=payment-service:50051
    depends_on:
      - order-db
      - payment-service

  notification-service:
    build:
      context: .
      dockerfile: notification/Dockerfile
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  rabbitmq_data: